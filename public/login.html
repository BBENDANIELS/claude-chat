<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f5f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      margin: 0;
    }
    .box {
      background: white;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 300px;
    }
    h2 { font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; text-align: center; }
    input {
      padding: 0.7rem 1rem;
      border: 1px solid #d0d0c8;
      border-radius: 2rem;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      text-align: center;
    }
    input:focus { border-color: #1a1a1a; }
    button {
      padding: 0.7rem;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 2rem;
      font-family: inherit;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #333; }
    .error { color: #c00; font-size: 0.85rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Claude</h2>
    <input type="password" id="pw" placeholder="Enter password" />
    <button onclick="login()">Enter</button>
    <div class="error" id="err">Incorrect password</div>
  </div>
  <script>
    if (sessionStorage.getItem("auth")) window.location.href = "/app";

    async function login() {
      const pw = document.getElementById("pw").value;
      const res = await fetch("/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        sessionStorage.setItem("auth", "1");
        window.location.href = "/app";
      } else {
        document.getElementById("err").style.display = "block";
      }
    }

    document.getElementById("pw").addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
