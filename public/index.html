<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --sidebar-bg: #171717;
      --surface: #1e1e1e;
      --surface2: #252525;
      --border: rgba(255,255,255,0.08);
      --text: #e8e4de;
      --text-muted: rgba(232,228,222,0.45);
      --accent: #c8b89a;
      --accent-dim: rgba(200,184,154,0.15);
      --user-bg: #2a2a2a;
      --code-bg: #161b22;
      --danger: #e07070;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    [data-theme="light"] {
      --bg: #f7f5f2;
      --sidebar-bg: #eeebe6;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a1a;
      --text-muted: rgba(26,26,26,0.45);
      --accent: #8b6f47;
      --accent-dim: rgba(139,111,71,0.1);
      --user-bg: #e8e4de;
      --code-bg: #f6f8fa;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      font-size: 16px;
      transition: background 0.2s, color 0.2s;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      transition: transform 0.25s ease, width 0.25s ease;
      z-index: 20;
    }

    #sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-right: none;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.35rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { color: var(--text); background: var(--accent-dim); }

    #new-chat-btn {
      margin: 0.75rem;
      padding: 0.65rem 1rem;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.15s;
    }
    #new-chat-btn:hover { background: var(--accent-dim); filter: brightness(1.2); }

    .sidebar-section-label {
      padding: 0.5rem 1rem 0.25rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    #conversations {
      flex: 1;
      overflow-y: auto;
      padding: 0.25rem 0.5rem;
    }

    .convo-item {
      padding: 0.6rem 0.75rem;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
    }
    .convo-item:hover { background: var(--surface2); color: var(--text); }
    .convo-item.active { background: var(--surface); color: var(--text); }

    .convo-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .convo-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.1rem 0.2rem;
      border-radius: 4px;
      font-size: 0.8rem;
      flex-shrink: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .convo-item:hover .convo-delete { opacity: 1; }
    .convo-delete:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 0.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── MAIN ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    #topbar {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    #chat-title {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── MESSAGES ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .welcome {
      margin: auto;
      text-align: center;
      color: var(--text-muted);
      animation: fadeUp 0.5s ease both;
    }
    .welcome h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .welcome p { font-size: 1rem; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .suggestion {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 2rem;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row {
      display: flex;
      padding: 0.75rem 0;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      animation: fadeUp 0.3s ease both;
    }

    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      line-height: 1.7;
      font-size: 1rem;
      position: relative;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      padding: 0.75rem 1.1rem;
      border-radius: 1.2rem 1.2rem 0.3rem 1.2rem;
      white-space: pre-wrap;
    }

    .msg-row.assistant .bubble {
      padding: 0.25rem 0;
    }

    /* Markdown */
    .bubble p { margin-bottom: 0.75rem; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1, .bubble h2, .bubble h3 { font-weight: 600; margin: 1rem 0 0.4rem; }
    .bubble h1 { font-size: 1.2rem; }
    .bubble h2 { font-size: 1.1rem; }
    .bubble h3 { font-size: 1rem; }
    .bubble ul, .bubble ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .bubble li { margin-bottom: 0.3rem; }
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble a { color: var(--accent); }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--text-muted);
      margin: 0.5rem 0;
    }
    .bubble table { border-collapse: collapse; width: 100%; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 0.4rem 0.75rem; }
    .bubble th { background: var(--surface2); }

    /* Code */
    .bubble code {
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.88rem;
      font-family: 'Fira Code', 'Consolas', monospace;
    }
    .code-block {
      position: relative;
      margin: 0.75rem 0;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1117;
      border-radius: 8px 8px 0 0;
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      font-family: monospace;
    }
    .copy-code-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      transition: color 0.15s;
      font-family: inherit;
    }
    .copy-code-btn:hover { color: white; }
    .bubble pre {
      margin: 0;
      border-radius: 0 0 8px 8px;
      overflow-x: auto;
    }
    .bubble pre code {
      background: none;
      padding: 0;
      font-size: 0.88rem;
    }

    /* Message actions */
    .msg-actions {
      display: flex;
      gap: 0.25rem;
      margin-top: 0.4rem;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .msg-row:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem 0.4rem;
      border-radius: 5px;
      font-size: 0.78rem;
      font-family: inherit;
      transition: color 0.15s, background 0.15s;
    }
    .msg-action-btn:hover { color: var(--text); background: var(--surface2); }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 0.5rem 0;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 0.75rem 1rem 1.25rem;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-box {
      max-width: 760px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: rgba(200,184,154,0.4);
      box-shadow: 0 0 0 3px rgba(200,184,154,0.08);
    }

    #file-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    #file-preview {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    #file-preview.hidden { display: none; }
    #file-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
    }
    #file-remove:hover { color: var(--danger); }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }

    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      resize: none;
      max-height: 200px;
      line-height: 1.5;
    }
    #input::placeholder { color: var(--text-muted); }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    #send-btn {
      width: 34px; height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { filter: brightness(1.1); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--surface2); cursor: not-allowed; }

    #stop-btn {
      width: 34px; height: 34px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #stop-btn.show { display: flex; }
    #stop-btn:hover { background: var(--accent-dim); }

    .input-hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Mobile */
    @media (max-width: 640px) {
      #sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(0); }
      #sidebar.collapsed { transform: translateX(-100%); width: 260px; min-width: 260px; }
      #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 15; }
      #overlay.show { display: block; }
    }
  </style>
</head>
<body>
  <div id="overlay"></div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="wordmark">Claude</span>
      <button class="icon-btn" id="close-sidebar-btn" title="Close sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <button id="new-chat-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>

    <div class="sidebar-section-label">Recent</div>
    <div id="conversations"></div>

    <div class="sidebar-footer">
      <button class="icon-btn" id="theme-btn" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" id="logout-btn" title="Log out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button class="icon-btn" id="toggle-sidebar-btn" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span id="chat-title">New conversation</span>
    </div>

    <div id="chat">
      <div class="welcome" id="welcome">
        <h1>Claude</h1>
        <p>How can I help you today?</p>
        <div class="suggestions">
          <button class="suggestion" onclick="useSuggestion(this)">Explain a complex topic simply</button>
          <button class="suggestion" onclick="useSuggestion(this)">Help me write something</button>
          <button class="suggestion" onclick="useSuggestion(this)">Debug my code</button>
          <button class="suggestion" onclick="useSuggestion(this)">Brainstorm ideas</button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div class="input-box">
        <div id="file-row">
          <div id="file-preview" class="hidden">
            <span id="file-name-display">file.pdf</span>
            <button id="file-remove">×</button>
          </div>
        </div>
        <div class="input-row">
          <button class="icon-btn" id="attach-btn" title="Attach file">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="file-input" accept="image/*,.pdf" style="display:none"/>
          <textarea id="input" rows="1" placeholder="Message Claude…"></textarea>
          <div class="input-actions">
            <button id="stop-btn" title="Stop generating">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
            <button id="send-btn" title="Send (Enter)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <script>
    // ── GUARD ──
    if (!sessionStorage.getItem("auth")) window.location.href = "/";

    // ── STATE ──
    const STORAGE_KEY = "claude-conversations-v2";
    let conversations = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let currentId = null;
    let isStreaming = false;
    let abortController = null;

    // ── MARKED CONFIG ──
    marked.setOptions({ breaks: true, gfm: true });

    const renderer = new marked.Renderer();
    renderer.code = (code, lang) => {
      const language = lang && hljs.getLanguage(lang) ? lang : "plaintext";
      let highlighted;
      try { highlighted = hljs.highlight(code, { language }).value; }
      catch { highlighted = hljs.highlightAuto(code).value; }
      return `<div class="code-block">
        <div class="code-header">
          <span>${language}</span>
          <button class="copy-code-btn" onclick="copyCode(this)">Copy</button>
        </div>
        <pre><code class="hljs language-${language}">${highlighted}</code></pre>
      </div>`;
    };
    marked.use({ renderer });

    // ── DOM ──
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const stopBtn = document.getElementById("stop-btn");
    const fileInput = document.getElementById("file-input");
    const filePreview = document.getElementById("file-preview");
    const fileNameDisplay = document.getElementById("file-name-display");
    const fileRemove = document.getElementById("file-remove");
    const attachBtn = document.getElementById("attach-btn");
    const convosEl = document.getElementById("conversations");
    const chatTitleEl = document.getElementById("chat-title");
    const welcome = document.getElementById("welcome");
    const themeBtn = document.getElementById("theme-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    // ── THEME ──
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
    updateHljsTheme(savedTheme);

    themeBtn.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      updateHljsTheme(next);
    });

    function updateHljsTheme(theme) {
      document.getElementById("hljs-theme").href = theme === "dark"
        ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css";
    }

    // ── SIDEBAR ──
    document.getElementById("toggle-sidebar-btn").addEventListener("click", toggleSidebar);
    document.getElementById("close-sidebar-btn").addEventListener("click", toggleSidebar);
    overlay.addEventListener("click", toggleSidebar);

    function toggleSidebar() {
      sidebar.classList.toggle("collapsed");
      overlay.classList.toggle("show");
    }

    // ── LOGOUT ──
    logoutBtn.addEventListener("click", () => {
      sessionStorage.removeItem("auth");
      window.location.href = "/";
    });

    // ── FILE ATTACH ──
    attachBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      const f = fileInput.files[0];
      if (!f) return;
      fileNameDisplay.textContent = f.name;
      filePreview.classList.remove("hidden");
    });
    fileRemove.addEventListener("click", () => {
      fileInput.value = "";
      filePreview.classList.add("hidden");
    });

    // ── CONVERSATIONS ──
    function newConversation() {
      currentId = "conv_" + Date.now();
      conversations[currentId] = { title: "New conversation", messages: [], createdAt: Date.now() };
      saveConversations();
      renderSidebar();
      clearChat();
    }

    function loadConversation(id) {
      currentId = id;
      clearChat();
      const convo = conversations[id];
      chatTitleEl.textContent = convo.title;
      if (convo.messages.length > 0) {
        welcome.style.display = "none";
        convo.messages.forEach(msg => {
          const text = typeof msg.content === "string" ? msg.content
            : (msg.content.find && msg.content.find(b => b.type === "text")?.text) || "";
          appendMessage(msg.role, text, false);
        });
      }
      renderSidebar();
    }

    function deleteConversation(id, e) {
      e.stopPropagation();
      delete conversations[id];
      saveConversations();
      if (currentId === id) newConversation();
      else renderSidebar();
    }

    function clearChat() {
      chatEl.innerHTML = "";
      chatEl.appendChild(welcome);
      welcome.style.display = "";
    }

    function saveConversations() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
    }

    function renderSidebar() {
      convosEl.innerHTML = "";
      const sorted = Object.entries(conversations)
        .sort(([,a],[,b]) => b.createdAt - a.createdAt);
      sorted.forEach(([id, convo]) => {
        const div = document.createElement("div");
        div.className = "convo-item" + (id === currentId ? " active" : "");
        div.innerHTML = `<span class="convo-title">${convo.title}</span>
          <button class="convo-delete" title="Delete">×</button>`;
        div.addEventListener("click", () => loadConversation(id));
        div.querySelector(".convo-delete").addEventListener("click", (e) => deleteConversation(id, e));
        convosEl.appendChild(div);
      });
    }

    document.getElementById("new-chat-btn").addEventListener("click", newConversation);

    // ── INIT ──
    const existingIds = Object.keys(conversations);
    if (existingIds.length > 0) {
      const lastId = existingIds.sort((a,b) => conversations[b].createdAt - conversations[a].createdAt)[0];
      loadConversation(lastId);
    } else {
      newConversation();
    }

    // ── MESSAGES ──
    function appendMessage(role, text, animate = true) {
      welcome.style.display = "none";

      const row = document.createElement("div");
      row.className = `msg-row ${role}`;
      if (!animate) row.style.animation = "none";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (role === "assistant") {
        bubble.innerHTML = marked.parse(text || "");
      } else {
        bubble.textContent = text;
      }

      const actions = document.createElement("div");
      actions.className = "msg-actions";
      actions.innerHTML = `<button class="msg-action-btn" onclick="copyMsg(this)">Copy</button>`;
      if (role === "assistant") {
        actions.innerHTML += `<button class="msg-action-btn" onclick="regenerate()">Retry</button>`;
      }

      row.appendChild(bubble);
      row.appendChild(actions);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      return { row, bubble };
    }

    function appendTypingIndicator() {
      const row = document.createElement("div");
      row.className = "msg-row assistant";
      row.id = "typing-indicator";
      row.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      return row;
    }

    // ── SEND ──
    async function send() {
      if (isStreaming) return;
      const text = inputEl.value.trim();
      const file = fileInput.files[0];
      if (!text && !file) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      isStreaming = true;
      sendBtn.disabled = true;
      stopBtn.classList.add("show");

      const userText = text || (file ? `📎 ${file.name}` : "");
      appendMessage("user", userText);

      const convo = conversations[currentId];
      convo.messages.push({ role: "user", content: text || "Describe this file." });

      const typing = appendTypingIndicator();

      const formData = new FormData();
      formData.append("messages", JSON.stringify(convo.messages));
      if (file) formData.append("file", file);

      abortController = new AbortController();
      let fullReply = "";

      try {
        const res = await fetch("/chat", { method: "POST", body: formData, signal: abortController.signal });
        typing.remove();

        const { row, bubble } = appendMessage("assistant", "", true);
        bubble.innerHTML = "";

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.type === "text") {
                fullReply += data.text;
                bubble.innerHTML = marked.parse(fullReply);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
            } catch {}
          }
        }

        convo.messages.push({ role: "assistant", content: fullReply });

        // Auto-title after first exchange
        if (convo.messages.length === 2) {
          autoTitle(currentId, convo.messages);
        }

        saveConversations();
        fileInput.value = "";
        filePreview.classList.add("hidden");

      } catch (err) {
        typing.remove();
        if (err.name !== "AbortError") {
          appendMessage("assistant", "Something went wrong — please try again.");
        }
      }

      isStreaming = false;
      sendBtn.disabled = false;
      stopBtn.classList.remove("show");
      abortController = null;
    }

    async function autoTitle(id, messages) {
      try {
        const res = await fetch("/title", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        if (data.title && conversations[id]) {
          conversations[id].title = data.title;
          chatTitleEl.textContent = data.title;
          saveConversations();
          renderSidebar();
        }
      } catch {}
    }

    function regenerate() {
      const convo = conversations[currentId];
      if (convo.messages.length < 2) return;
      // Remove last assistant message
      if (convo.messages[convo.messages.length - 1].role === "assistant") {
        convo.messages.pop();
      }
      // Remove last assistant bubble
      const rows = chatEl.querySelectorAll(".msg-row.assistant");
      if (rows.length > 0) rows[rows.length - 1].remove();
      saveConversations();

      // Re-send
      const formData = new FormData();
      formData.append("messages", JSON.stringify(convo.messages));
      _streamResponse(formData, convo);
    }

    async function _streamResponse(formData, convo) {
      isStreaming = true;
      sendBtn.disabled = true;
      stopBtn.classList.add("show");
      abortController = new AbortController();
      let fullReply = "";

      const typing = appendTypingIndicator();
      try {
        const res = await fetch("/chat", { method: "POST", body: formData, signal: abortController.signal });
        typing.remove();
        const { row, bubble } = appendMessage("assistant", "", true);
        bubble.innerHTML = "";
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.type === "text") {
                fullReply += data.text;
                bubble.innerHTML = marked.parse(fullReply);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
            } catch {}
          }
        }
        convo.messages.push({ role: "assistant", content: fullReply });
        saveConversations();
      } catch (err) {
        typing.remove();
        if (err.name !== "AbortError") appendMessage("assistant", "Something went wrong.");
      }
      isStreaming = false;
      sendBtn.disabled = false;
      stopBtn.classList.remove("show");
      abortController = null;
    }

    stopBtn.addEventListener("click", () => {
      if (abortController) abortController.abort();
    });

    // ── SUGGESTIONS ──
    function useSuggestion(btn) {
      inputEl.value = btn.textContent;
      inputEl.focus();
    }

    // ── COPY ──
    function copyMsg(btn) {
      const bubble = btn.closest(".msg-row").querySelector(".bubble");
      navigator.clipboard.writeText(bubble.innerText);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    }

    function copyCode(btn) {
      const code = btn.closest(".code-block").querySelector("code");
      navigator.clipboard.writeText(code.innerText);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    }

    // ── INPUT AUTO-RESIZE ──
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    sendBtn.addEventListener("click", send);
  </script>
</body>
</html>
