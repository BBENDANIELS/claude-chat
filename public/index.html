<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f5f5f0;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 720px;
      padding: 1.5rem 1rem 0.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 85%;
      line-height: 1.6;
      font-size: 0.97rem;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a1a1a;
      color: #f5f5f0;
      padding: 0.75rem 1rem;
      border-radius: 1rem 1rem 0.2rem 1rem;
    }

    .msg.assistant {
      align-self: flex-start;
      background: white;
      border: 1px solid #e0e0d8;
      padding: 0.75rem 1rem;
      border-radius: 0.2rem 1rem 1rem 1rem;
      white-space: pre-wrap;
    }

    .msg.assistant.thinking {
      color: #aaa;
      font-style: italic;
    }

    #input-area {
      width: 100%;
      max-width: 720px;
      padding: 0.75rem 1rem 1.25rem;
      display: flex;
      gap: 0.5rem;
    }

    #input {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 1px solid #d0d0c8;
      border-radius: 2rem;
      background: white;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      resize: none;
    }

    #input:focus { border-color: #1a1a1a; }

    button {
      padding: 0.7rem 1.25rem;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 2rem;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    button:hover { background: #333; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>Claude</header>

  <div id="chat"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Message Claude…"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const history = [];

    function addMessage(role, text, temp = false) {
      const div = document.createElement("div");
      div.className = `msg ${role}${temp ? " thinking" : ""}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      sendBtn.disabled = true;
      addMessage("user", text);
      history.push({ role: "user", content: text });

      const thinking = addMessage("assistant", "Thinking…", true);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        const reply = data.reply || data.error;
        thinking.remove();
        addMessage("assistant", reply);
        history.push({ role: "assistant", content: reply });
      } catch {
        thinking.textContent = "Error — please try again.";
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
